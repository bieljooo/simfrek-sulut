<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" role="img" aria-labelledby="title desc">
  <title id="title">Main Tech Stack</title>
  <desc id="desc">Dark banner with 10 rounded tech stack tiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d12"/>
      <stop offset="100%" stop-color="#111824"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#2a4f73" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#0a0d12" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 44px "Segoe UI", Arial, sans-serif; fill: #d8dee9; letter-spacing: -0.03em; }
      .icon { font: 800 32px "Segoe UI", Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 700 24px "Segoe UI", Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .code { font: 800 24px Consolas, "Courier New", monospace; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1000" height="320" fill="url(#bg)"/>
  <rect width="1000" height="320" fill="url(#glow)"/>
  <text x="500" y="48" class="title" text-anchor="middle">Main Tech Stack</text>
  <line x1="0" y1="60" x2="1000" y2="60" stroke="#253141" stroke-opacity="0.55"/>

  <!-- Row 1 -->
  <g filter="url(#shadow)">
    <rect x="258" y="78" width="84" height="84" rx="20" fill="#ff2d20"/>
    <polygon points="286,102 300,94 314,102 300,110" fill="#ffffff" opacity="0.95"/>
    <polygon points="286,114 300,106 314,114 300,122" fill="#ffffff" opacity="0.75"/>
    <polygon points="286,126 300,118 314,126 300,134" fill="#ffffff" opacity="0.55"/>

    <rect x="358" y="78" width="84" height="84" rx="20" fill="#7c4dff"/>
    <text x="400" y="121" class="small" fill="#ffffff">PHP</text>

    <rect x="458" y="78" width="84" height="84" rx="20" fill="#222733"/>
    <text x="500" y="121" class="code" fill="#d8dee9">&lt;/&gt;</text>

    <rect x="558" y="78" width="84" height="84" rx="20" fill="#111827"/>
    <text x="600" y="121" class="icon" fill="#ffffff">F</text>

    <rect x="658" y="78" width="84" height="84" rx="20" fill="#f7df1e"/>
    <text x="700" y="121" class="icon" fill="#111827">JS</text>
  </g>

  <!-- Row 2 -->
  <g filter="url(#shadow)">
    <rect x="258" y="182" width="84" height="84" rx="20" fill="#005f8f"/>
    <ellipse cx="300" cy="204" rx="16" ry="7" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M284 204v22c0 4 7 8 16 8s16-4 16-8v-22" fill="none" stroke="#ffffff" stroke-width="3"/>
    <ellipse cx="300" cy="234" rx="16" ry="7" fill="none" stroke="#ffffff" stroke-width="3"/>

    <rect x="358" y="182" width="84" height="84" rx="20" fill="#0d6efd"/>
    <text x="400" y="225" class="icon" fill="#ffffff">B</text>

    <rect x="458" y="182" width="84" height="84" rx="20" fill="#7c3aed"/>
    <polygon points="504,197 489,224 501,224 494,249 511,221 499,221" fill="#ffffff"/>

    <rect x="558" y="182" width="84" height="84" rx="20" fill="#22c55e"/>
    <path d="M600 196c-9 0-16 7-16 16 0 12 16 28 16 28s16-16 16-28c0-9-7-16-16-16zm0 24a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" fill="#ffffff"/>

    <rect x="658" y="182" width="84" height="84" rx="20" fill="#f97316"/>
    <path d="M700 197l16 28h-32l16-28z" fill="#ffffff"/>
    <rect x="697.5" y="206" width="5" height="10" rx="2.5" fill="#f97316"/>
    <circle cx="700" cy="221" r="3" fill="#f97316"/>
  </g>
</svg>
